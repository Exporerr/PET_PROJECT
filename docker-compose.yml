version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api-service
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      API_ENV: /app/internal/api-service/Configs/.env
      DB_SERVICE_URL: http://db-service:8081
    networks:
      - appnet

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: db-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      DB_ENV: /app/internal/db-service/configs/.env
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: post4302
      DB_NAME: taskss
    networks:
      - appnet

  postgres:
    image: postgres:16.11-bookworm
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: post4302
      POSTGRES_DB: taskss
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
  migrate:
  build:
    context: .
    dockerfile: Dockerfile.db
  depends_on:
    - db
  environment:
    DB_HOST: postgres
    DB_PORT: 5432
    DB_USER: postgres
    DB_PASSWORD: post4302
    DB_NAME: taskss
  command: ["migrate", "-path", "/app/migrations", "-database", "postgres://postgres:post4302@postgres:5432/taskss?sslmode=disable", "up"]
  restart: "no"
  networks:
    - appnet
    
  zookeeper:
    image: wurstmeister/zookeeper:3.4.6
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - appnet

  kafka:
    image: wurstmeister/kafka:2.13-3.5.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - appnet

  
  

 


volumes:
  pgdata:

networks:
  appnet:

